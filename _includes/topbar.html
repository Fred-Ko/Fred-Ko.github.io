<header id="topbar-wrapper" class="flex-shrink-0" aria-label="Top Bar">
  <div id="topbar" class="editorial-nav">
    <a class="editorial-brand" href="{{ '/' | relative_url }}" aria-label="Fredko Dev Log home">
      <span>FREDKO</span><b>.</b><small>DEV LOG</small>
    </a>

    <nav class="editorial-nav-links" aria-label="Primary navigation">
      <a href="{{ '/' | relative_url }}"{% if page.layout == 'home' %} class="active"{% endif %}>Writing</a>
      {% for tab in site.tabs %}
        {% capture tab_name %}{{ tab.url | split: '/' }}{% endcapture %}
        <a href="{{ tab.url | relative_url }}"{% if tab.url == page.url %} class="active"{% endif %}>
          {{- site.data.locales[include.lang].tabs.[tab_name] | default: tab.title -}}
        </a>
      {% endfor %}
      <a href="{{ site.social.links[0] }}" target="_blank" rel="noopener noreferrer">GitHub ↗</a>
      <a href="{{ site.social.links[1] }}" target="_blank" rel="noopener noreferrer">LinkedIn ↗</a>
    </nav>

    <div id="topbar-title">{{ site.title }}</div>

    <div class="editorial-nav-actions">
      <button
        type="button"
        class="editorial-theme-toggle"
        data-mode-toggle
        role="switch"
        aria-checked="true"
        aria-label="라이트 모드로 전환"
        title="라이트 모드로 전환"
      >
        <span class="editorial-theme-check" aria-hidden="true">
          <span class="editorial-theme-icon">
            <span class="editorial-theme-sun"></span>
            <span class="editorial-theme-moon"></span>
          </span>
        </span>
      </button>

      <search id="search" class="align-items-center">
        <i class="fas fa-search fa-fw"></i>
        <input
          class="form-control"
          id="search-input"
          type="search"
          aria-label="search"
          autocomplete="off"
          placeholder="{{ site.data.locales[include.lang].search.hint | capitalize }}..."
        >
      </search>

      <button type="button" id="search-trigger" class="btn btn-link" aria-label="Search">
        <i class="fas fa-search fa-fw"></i>
      </button>
      <button type="button" id="sidebar-trigger" class="btn btn-link" aria-label="Menu">
        <i class="fas fa-bars fa-fw"></i>
      </button>
      <button type="button" class="btn btn-link text-decoration-none" id="search-cancel">
        {{- site.data.locales[include.lang].search.cancel -}}
      </button>
    </div>
  </div>
</header>
