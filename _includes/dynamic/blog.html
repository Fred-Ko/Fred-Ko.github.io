<section
  id="dynamic-blog"
  class="dynamic-blog"
  data-api-base="{{ site.dynamic_blog.api_base | default: '/api' }}"
  data-view-delay="{{ site.dynamic_blog.view_delay_ms | default: 8000 }}"
  data-oauth-enabled="{% if site.dynamic_blog.oauth_enabled == false %}false{% else %}true{% endif %}"
  aria-labelledby="comments-title"
>
  <div class="dynamic-stats" aria-label="게시물 통계">
    <span title="조회수"><i class="far fa-eye fa-fw"></i> <span data-stat="views">–</span></span>
    <button type="button" class="dynamic-like" data-action="like" aria-pressed="false">
      <i class="far fa-heart fa-fw"></i>
      <span data-stat="likes">–</span>
      <span class="visually-hidden">좋아요</span>
    </button>
    <span title="댓글"><i class="far fa-comment fa-fw"></i> <span data-stat="comments">–</span></span>
  </div>

  <div class="dynamic-comments">
    <div class="dynamic-comments-heading">
      <h2 id="comments-title">댓글</h2>
      <div data-auth-state aria-live="polite"></div>
    </div>
    <div class="dynamic-notice" data-notice hidden role="status"></div>
    <form class="dynamic-comment-form" data-comment-form hidden>
      <label for="dynamic-comment-content">Markdown으로 댓글 작성</label>
      <textarea
        id="dynamic-comment-content"
        name="content"
        rows="5"
        minlength="2"
        maxlength="5000"
        required
        placeholder="댓글을 입력하세요. Markdown 일부 문법을 사용할 수 있습니다."
      ></textarea>
      <div class="dynamic-form-actions">
        <small>굵게, 기울임, 코드, 링크, 인용, 목록을 지원합니다.</small>
        <button type="submit" class="btn btn-primary btn-sm">댓글 등록</button>
      </div>
    </form>
    <div class="dynamic-comments-list" data-comments-list aria-live="polite">
      <p class="text-muted">댓글을 불러오는 중입니다.</p>
    </div>
    <button type="button" class="btn btn-outline-secondary btn-sm" data-load-more hidden>
      댓글 더 보기
    </button>
  </div>
</section>
